<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOKYO SYSTEM - Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app">
        <!-- ====== Main Content (بدون Sidebar) ====== -->
        <main class="main-content-full">
            <!-- ====== Header بسيط ====== -->
            <header class="header-simple">
                <div class="logo-simple">
                    <span class="neon-text">TOKYO</span>
                    <span class="sub-logo">SYSTEM</span>
                </div>
            </header>
            
            <!-- ====== المحتوى ====== -->
            <div class="content-full">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
    
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
