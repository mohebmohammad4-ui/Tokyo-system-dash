{% extends "base.html" %}

{% block title %}{{ guild.name }}{% endblock %}

{% block content %}
<div class="page-header">
    <h2>
        {% if guild.icon %}
        <img src="https://cdn.discordapp.com/icons/{{ guild.id }}/{{ guild.icon }}.png" 
             style="width: 32px; height: 32px; border-radius: 50%; vertical-align: middle; margin-right: 12px;">
        {% endif %}
        {{ guild.name }}
    </h2>
    <a href="/dashboard" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> العودة للسيرفرات</a>
</div>

<div class="card">
    <div class="card-body">
        <p>✅ صفحة السيرفر تعمل بنجاح!</p>
        <p>Guild ID: {{ guild.id }}</p>
        <p>Guild Name: {{ guild.name }}</p>
    </div>
</div>
{% endblock %}
