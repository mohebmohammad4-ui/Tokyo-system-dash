{% extends "base.html" %}

{% block title %}Colors{% endblock %}

{% block content %}
<div class="page-header">
    <h2><i class="fas fa-palette"></i> Colors</h2>
    <p>إدارة ألوان الرتب</p>
</div>

<div class="card">
    <div class="card-header">
        <h3>🎨 Set Role Color</h3>
    </div>
    <div class="card-body">
        <div class="color-form">
            <div class="form-group">
                <label>Role</label>
                <select class="form-select">
                    <option>Select role...</option>
                </select>
            </div>
            <div class="form-group">
                <label>Color (Hex)</label>
                <input type="color" class="form-color" value="#00d4ff">
                <input type="text" class="form-input" value="#00d4ff" placeholder="#00d4ff">
            </div>
            <button class="btn btn-primary">Save</button>
        </div>
    </div>
</div>

<div class="card mt-3">
    <div class="card-header">
        <h3>📋 Role Colors</h3>
    </div>
    <div class="card-body">
        <table class="table">
            <thead>
                <tr>
                    <th>Role</th>
                    <th>Color</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="2" class="text-center text-muted">No colors set</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
